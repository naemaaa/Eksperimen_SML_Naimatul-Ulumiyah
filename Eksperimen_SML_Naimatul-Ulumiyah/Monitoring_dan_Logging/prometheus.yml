# prometheus.yml
# ==============
# Konfigurasi Prometheus untuk monitoring Sepsis ICU model.
#
# Jalankan:
#   prometheus --config.file=prometheus.yml
#
# Akses UI: http://localhost:9090

global:
  scrape_interval:     5s   # Seberapa sering Prometheus scrape metrics
  evaluation_interval: 5s   # Seberapa sering rules dievaluasi
  scrape_timeout:      4s

  # Label yang ditambahkan ke semua time series
  external_labels:
    monitor  : 'sepsis-icu-monitor'
    project  : 'msml-submission'

# Alert rules (load dari file terpisah) ────────────────────────────────────
rule_files:
  - "alert_rules.yml"

# Alertmanager (opsional, untuk notifikasi) ─────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # 1. Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # 2. Scrape model metrics dari exporter kita
  - job_name: 'sepsis_model_metrics'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:8000']
        labels:
          service     : 'sepsis-icu-model'
          model_type  : 'xgboost'
          environment : 'local'

  # 3. Scrape MLflow serving (jika punya /metrics endpoint)
  # - job_name: 'mlflow_serving'
  #   static_configs:
  #     - targets: ['localhost:5001']
